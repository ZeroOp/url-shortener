apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"

    # ADD these for CORS local development 4200
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:4200"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
spec:
  rules:
    - host: link.zeroop.dev
      http:
        paths:
          # --- GROUP 1: API ROUTES ---
          - path: /api/analytics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: analytics-srv
                port:
                  number: 3000
          - path: /api/id-gen/next-range
            pathType: ImplementationSpecific
            backend:
              service:
                name: counter-srv
                port:
                  number: 3000
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-srv
                port:
                  number: 3000
          - path: /api/url(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000

          # --- GROUP 2: THE SYSTEM REDIRECT ---
          - path: /r(/|$)(.+)$
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000

          # --- GROUP 3: FRONTEND CLIENT (Catch-all for files/SPA) ---
          # We place this BEFORE the custom alias so it can catch static assets
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-srv 
                port:
                  number: 3000

          # --- GROUP 4: CUSTOM ALIAS CATCH ---
          # FIX: We use a regex that ONLY matches alphanumeric characters.
          # Because it lacks a '.', it will IGNORE .js, .css, and .ico files.
          - path: /([a-zA-Z0-9_-]+)$
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000