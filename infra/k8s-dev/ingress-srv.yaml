apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - host: link.zeroop.dev
      http:
        paths:
          - path: /api/analytics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: analytics-srv # Make sure this matches your ClusterIP service name
                port:
                  number: 3000
    - host: link.zeroop.dev
      http:
        paths:
          - path: /api/id-gen/next-range
            pathType: ImplementationSpecific
            backend:
              service:
                name: counter-srv
                port:
                  number: 3000
    - host: link.zeroop.dev
      http:
        paths:
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-srv
                port:
                  number: 3000
    - host: link.zeroop.dev
      http:
        paths:
          - path: /api/url(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000
    - host: link.zeroop.dev
      http:
        paths:
          - path: /r(/|$)(.+)$
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000
    - host: link.zeroop.dev
      http:
        paths:
          # Custom alias redirects live at "/:customAlias"
          # Match only a single URL segment ("/someAlias"), so it won't shadow "/api/*" or "/r/<code>".
          - path: /([^/]+)$
            pathType: ImplementationSpecific
            backend:
              service:
                name: url-srv
                port:
                  number: 3000