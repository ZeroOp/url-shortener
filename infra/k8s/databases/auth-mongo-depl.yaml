# Stateless service.
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  clusterIP: None
  selector:
    app: mongo
  ports:
    - port: 27017
---
# Statefull mongo deployment
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: mongo
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            # Limits the WiredTiger cache size (internal Mongo memory)
            - "--wiredTigerCacheSizeGB"
            - "0.25" 
          resources:
            requests:
              memory: "300Mi"
            limits:
              memory: "512Mi" # Total 1.5GB for the cluster
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi