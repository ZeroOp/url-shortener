apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      containers:
        - name: counter
          image: zeroop/url-shortner-counter-service
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: counter-srv
spec:
  selector:
    app: counter
  ports:
    - name: counter
      protocol: TCP
      port: 3000
      targetPort: 3000