apiVersion: v1
kind: Service
metadata:
  name: nats-srv
spec:
  # This creates a "Headless" service so pods can find each other's IPs directly
  clusterIP: None 
  selector:
    app: nats
  ports:
    - name: client
      protocol: TCP
      port: 4222
      targetPort: 4222
    - name: cluster        # The port for pods to gossip/communicate
      protocol: TCP
      port: 6222
      targetPort: 6222
    - name: monitoring
      protocol: TCP
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats-depl
spec:
  serviceName: "nats-srv"
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats-streaming:0.17.0
          args: [
              "-p", "4222",
              "-m", "8222",
              "-hbi", "5s",
              "-hbt", "5s",
              "-hbf", "2",
              "-SD",
              "-cid", "url-shortener", 
              "-dir", "/data",
              "-store", "file",
              "--clustered",
              "--cluster", "nats://0.0.0.0:6222", 
              "--cluster_node_id", "$(POD_NAME)",
              "--cluster_peers", "nats-depl-0,nats-depl-1,nats-depl-2",
              "--routes", "nats://nats-depl-0.nats-srv:6222,nats://nats-depl-1.nats-srv:6222,nats://nats-depl-2.nats-srv:6222"
            ]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: nats-storage
              mountPath: /data
      volumes:
        - name: nats-storage
          # emptyDir ensures data is wiped when the pod is deleted/restarted
          emptyDir: {}