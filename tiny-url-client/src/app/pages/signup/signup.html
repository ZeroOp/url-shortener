<app-auth-layout>
    <mat-card class="signup-card">
      @if (isLoading()) {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      }
      
      <mat-card-header>
        <mat-card-title>Create Account</mat-card-title>
        <mat-card-subtitle>Join us to start shortening your links</mat-card-subtitle>
      </mat-card-header>
  
      <mat-card-content>
        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
          
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" placeholder="ram@cisco.com">
            <mat-icon matSuffix>alternate_email</mat-icon>
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
            <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button">
              <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm Password</mat-label>
            <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="confirmPassword">
            @if (signupForm.hasError('passwordMismatch') && signupForm.get('confirmPassword')?.touched) {
              <mat-error>Passwords do not match</mat-error>
            }
          </mat-form-field>
  
          <button mat-flat-button class="submit-btn" 
                  [disabled]="isLoading()">
            Create Account
          </button>
  
          <div class="footer-link">
            Already have an account? <span routerLink="/signin">Sign In</span>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </app-auth-layout>
