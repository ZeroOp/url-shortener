<div class="split-container">
    <div class="auth-wrapper">
      
      <div class="brand-section">
        <div class="content">
          <mat-icon class="logo-icon">link</mat-icon>
          <h1>Shorten. <br>Analyze. <br>Succeed.</h1>
          <p>Your centralized hub for powerful, branded short links.</p>
          
          <div class="feature-list">
            <div class="feature"><mat-icon>analytics</mat-icon> Custom Analytics</div>
            <div class="feature"><mat-icon>security</mat-icon> Enterprise Security</div>
            <div class="feature"><mat-icon>speed</mat-icon> Nano-second Redirects</div>
          </div>
        </div>
      </div>
    
      <div class="form-section">
        <mat-card class="signin-card">
          @if (isLoading()) {
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
          }
          
          <mat-card-header>
            <mat-card-title>Sign In</mat-card-title>
            <mat-card-subtitle>Enter your credentials to continue</mat-card-subtitle>
          </mat-card-header>
    
          <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Email Address</mat-label>
                <input matInput formControlName="email" placeholder="ram@cisco.com">
                <mat-icon matSuffix>alternate_email</mat-icon>
              </mat-form-field>
    
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Password</mat-label>
                <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
                <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button">
                  <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
              </mat-form-field>
    
              <button mat-flat-button color="primary" class="submit-btn" 
                      [disabled]="loginForm.invalid || isLoading()">
                Log In to Dashboard
              </button>
            </form>
          </mat-card-content>
        </mat-card>
      </div>
  
    </div>
  </div>
