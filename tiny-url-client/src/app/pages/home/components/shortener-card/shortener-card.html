<mat-card class="shortener-card">
    <mat-card-header>
      <mat-card-title>Shorten URL</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Paste your long link</mat-label>
        <input matInput #urlInput placeholder="https://example.com/link">
        <mat-icon matPrefix>link</mat-icon>
      </mat-form-field>
  
      <button mat-flat-button color="primary" 
        class="full-width shorten-btn" 
        [disabled]="isLoading" 
        (click)="shorten(urlInput)"> {{ isLoading ? 'Shortening...' : 'Shorten Now' }}
      </button>
  
      @if (shortenedUrl) {
        <div class="result-container" (click)="copyToClipboard()">
          <div class="result-label">Your Short Link:</div>
          <div class="result-link">
            <span>{{ shortenedUrl }}</span>
            <mat-icon>content_copy</mat-icon>
          </div>
          <div class="copy-hint">Click to copy</div>
        </div>
      }
    </mat-card-content>
  </mat-card>
