<div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      
      <ng-container matColumnDef="shortUrl">
        <th mat-header-cell *matHeaderCellDef>Short Link</th>
        <td mat-cell *matCellDef="let link">
          <span class="link-text">{{ link.shortUrl }}</span>
        </td>
      </ng-container>
  
      <ng-container matColumnDef="clicks">
        <th mat-header-cell *matHeaderCellDef>Clicks</th>
        <td mat-cell *matCellDef="let link"> {{ link.clicks | number }} </td>
      </ng-container>
  
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let link" class="text-right">
          <button mat-icon-button color="primary" [routerLink]="['/dashboard/link', link.shortUrl]">
            <mat-icon>insights</mat-icon>
          </button>
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
