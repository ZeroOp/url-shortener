server {
    listen 3000;
    include /etc/nginx/mime.types;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # EXPLICITLY FORCE JS TYPE
    location ~ \.js$ {
        root /usr/share/nginx/html;
        add_header Content-Type application/javascript;
    }
}